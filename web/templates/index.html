{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-8 text-center">
        <h2 class="mb-5">小鱼风控系统</h2>
        <div class="row g-4">
            <div class="col-md-3">
                <a href="/payment/new" class="text-decoration-none">
                    <div class="card h-100 hover-card">
                        <div class="card-body text-center py-5">
                            <div class="fs-1 mb-3">💰</div>
                            <h5>出款申请</h5>
                            <p class="text-muted small">风控审核 + 出款计算</p>
                        </div>
                    </div>
                </a>
            </div>
            <div class="col-md-3">
                <a href="/projects" class="text-decoration-none">
                    <div class="card h-100 hover-card">
                        <div class="card-body text-center py-5">
                            <div class="fs-1 mb-3">🔄</div>
                            <h5>同步项目</h5>
                            <p class="text-muted small">从老库同步 + 项目注册</p>
                        </div>
                    </div>
                </a>
            </div>
            <div class="col-md-3">
                <a href="/approval/new" class="text-decoration-none">
                    <div class="card h-100 hover-card">
                        <div class="card-body text-center py-5">
                            <div class="fs-1 mb-3">📋</div>
                            <h5>立项申请</h5>
                            <p class="text-muted small">立项审核 + 资质评估</p>
                        </div>
                    </div>
                </a>
            </div>
        </div>
        <div class="row g-4 mt-1 justify-content-center">
            <div class="col-md-3">
                <a href="/unit-prices" class="text-decoration-none">
                    <div class="card h-100 hover-card">
                        <div class="card-body text-center py-5">
                            <div class="fs-1 mb-3">💴</div>
                            <h5>单价配置</h5>
                            <p class="text-muted small">项目单价 + 计费规则</p>
                        </div>
                    </div>
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
